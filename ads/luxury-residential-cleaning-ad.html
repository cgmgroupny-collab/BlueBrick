<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Brick — Luxury Residential Cleaning Ad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080810;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Manrope', sans-serif;
  }

  .ad {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* === FULL-BLEED PHOTO === */
  .photo {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  /* === OVERLAYS === */
  .overlay-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 400px;
    background: linear-gradient(180deg,
      rgba(0,15,38,0.9) 0%,
      rgba(0,15,38,0.78) 35%,
      rgba(0,15,38,0.4) 65%,
      transparent 100%
    );
    z-index: 5;
  }

  .overlay-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 540px;
    background: linear-gradient(0deg,
      rgba(0,15,38,0.96) 0%,
      rgba(0,15,38,0.9) 30%,
      rgba(0,15,38,0.55) 60%,
      transparent 100%
    );
    z-index: 5;
  }

  .overlay-full {
    position: absolute;
    inset: 0;
    background: rgba(0,15,38,0.15);
    z-index: 4;
  }

  /* === TOP ACCENT BAR === */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(90deg, #ECA400, #d4940a);
    z-index: 20;
  }

  /* === HEADER === */
  .header {
    position: absolute;
    top: 44px;
    left: 60px;
    right: 60px;
    z-index: 20;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .brand-logo {
    height: 38px;
    filter: brightness(0) invert(1);
  }

  .tag {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: #ECA400;
    background: rgba(236,164,0,0.08);
    border: 1px solid rgba(236,164,0,0.25);
    padding: 10px 24px;
  }

  /* === HEADLINE === */
  .headline {
    position: absolute;
    top: 145px;
    left: 60px;
    right: 60px;
    z-index: 20;
  }

  .headline .eyebrow {
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #ECA400;
    margin-bottom: 22px;
  }

  .headline h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 92px;
    line-height: 0.94;
    letter-spacing: 1px;
    color: #ffffff;
    max-width: 820px;
  }

  .headline h1 .amber {
    color: #ECA400;
  }

  /* === SERVICES === */
  .services {
    position: absolute;
    bottom: 300px;
    left: 60px;
    right: 60px;
    z-index: 20;
    display: flex;
    gap: 0;
  }

  .svc {
    flex: 1;
    padding: 22px 0;
    border-top: 2px solid rgba(236,164,0,0.3);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .svc:not(:last-child) {
    margin-right: 24px;
  }

  .svc .check {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(236,164,0,0.15);
    color: #ECA400;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    flex-shrink: 0;
  }

  .svc .name {
    font-family: 'Manrope', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.3px;
  }

  /* === OFFER === */
  .offer {
    position: absolute;
    bottom: 160px;
    left: 60px;
    right: 60px;
    z-index: 20;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .offer-main {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .offer-main .small {
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  .offer-main .big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    letter-spacing: 3px;
    color: #ffffff;
    line-height: 1;
  }

  .offer-main .big span {
    color: #ECA400;
  }

  .offer-trust {
    display: flex;
    gap: 28px;
  }

  .trust {
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .trust .dot {
    width: 5px;
    height: 5px;
    background: #ECA400;
    border-radius: 50%;
  }

  /* === CTA BAR === */
  .cta-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 105px;
    background: #ECA400;
    z-index: 25;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }

  .cta-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 3px;
    color: #001D4A;
    line-height: 1;
  }

  .cta-divider {
    width: 1.5px;
    height: 34px;
    background: rgba(0,29,74,0.25);
  }

  .cta-phone {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 2px;
    color: #001D4A;
    line-height: 1;
  }
</style>
</head>
<body>

<div class="ad">
  <!-- Full-bleed photo background -->
  <div class="photo">
    <img src="../assets/images/Luxury apt images/pexels-artbovich-8082229.jpg" alt="Luxury living room">
  </div>

  <!-- Overlays -->
  <div class="overlay-full"></div>
  <div class="overlay-top"></div>
  <div class="overlay-bottom"></div>

  <!-- Top accent bar -->
  <div class="top-bar"></div>

  <!-- Header: logo only + tag -->
  <div class="header">
    <img src="../assets/images/logo-horizontal-dark.png" alt="Blue Brick" class="brand-logo">
    <div class="tag">Luxury Residential</div>
  </div>

  <!-- Headline -->
  <div class="headline">
    <div class="eyebrow">White-Glove Service &bull; Greater Boston</div>
    <h1>YOUR HOME<br>DESERVES MORE<br>THAN A <span class="amber">BASIC</span><br>CLEAN<span class="amber">.</span></h1>
  </div>

  <!-- Services -->
  <div class="services">
    <div class="svc">
      <span class="check">&#10003;</span>
      <span class="name">Deep Cleaning</span>
    </div>
    <div class="svc">
      <span class="check">&#10003;</span>
      <span class="name">Recurring Service</span>
    </div>
    <div class="svc">
      <span class="check">&#10003;</span>
      <span class="name">Pre-Event Prep</span>
    </div>
    <div class="svc">
      <span class="check">&#10003;</span>
      <span class="name">Move-In Ready</span>
    </div>
  </div>

  <!-- Offer -->
  <div class="offer">
    <div class="offer-main">
      <div class="small">Book This Week</div>
      <div class="big">FREE <span>ESTIMATE</span></div>
    </div>
    <div class="offer-trust">
      <div class="trust"><span class="dot"></span> Background-Checked</div>
      <div class="trust"><span class="dot"></span> Eco-Friendly</div>
      <div class="trust"><span class="dot"></span> 100% Satisfaction</div>
    </div>
  </div>

  <!-- CTA Bar -->
  <div class="cta-bar">
    <div class="cta-text">GET YOUR FREE ESTIMATE</div>
    <div class="cta-divider"></div>
    <div class="cta-phone">781-330-5604</div>
  </div>
</div>

</body>
</html>
